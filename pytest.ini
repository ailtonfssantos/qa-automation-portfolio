[pytest]
# Diretórios onde o pytest deve procurar por testes
testpaths = tests

# Padrão de nomeação de arquivos de teste
python_files = test_*.py *_test.py

# Padrão de nomeação de funções de teste
python_functions = test_*

# Opções executadas por padrão ao rodar 'pytest'
addopts =
    -v
    --strict-markers
    --disable-warnings
    --tb=short

# Registro de markers personalizados (evita warnings de markers desconhecidos)
markers =
    smoke: Testes críticos de fumaça
    regression: Testes de regressão completa
    api: Testes de integração de API
    ui: Testes de interface de usuário
